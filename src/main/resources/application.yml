spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:itaccessdb}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:your-email@gmail.com}
    password: ${SMTP_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
    from: ${MAIL_FROM:noreply@itaccess.local}
  
  servlet:
    multipart:
      max-file-size: 150MB
      max-request-size: 150MB

server:
  port: ${SERVER_PORT:8000}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}
  
  jwt:
    secret: ${JWT_SECRET:please-change-this-in-production-use-a-secure-random-key-at-least-256-bits}
    expiration: 1800000
  
  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}
  
  upload:
    dir: ${UPLOAD_DIR:uploads/apk}
    max-file-size: ${MAX_FILE_SIZE:150MB}

logging:
  level:
    com.itaccess: ${LOG_LEVEL:DEBUG}